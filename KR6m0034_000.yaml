front:
  text: 補刻二諦章敘嘉祥藏大師所撰二諦義章三卷傳流吾國已來僅一千年奇矣寵藏之古名藍之間而不以廣其傳者也久矣向者龍寶與公偶得上下兩通輒刻木以布海內譬諸寶鼎之闕一足不亦恨乎近有書林某者幸得古本之全者而來請余重施國字而傳於千歲之下矣於是兩本對撿則與公之本非但闕中卷亦於上卷中脫二十餘紙況且豕亥鳳風比比有之余慨然喟言曾聞其名未得其書如渴者聞梅然而雖偶得傳之闕而未完全者幾許年所今也幸得見其全書前之所謂渴云者頓息矣余既然則人誰不爾乎今將廣行于天下此舉豈辭勞乎是余之所以忘固陋而不敢辭其請也而今上下兩卷直用與公之所刻者不復改彫其中或文字寫誤者或兩本相異者或疑而未決者或恐此處必脫某字者則皆標之卷眉而一處未嘗以私意改易之務在存古耳於是乎可謂寶鼎再得為完器也何其快哉其既然則安知章主大師之不熙怡微咲於那伽定中也又安知與公之不忻躍於地下也是為序寶永七年歲次庚寅孟春日洛西五智山沙門慧旭寂謹書於忘慮亭鐫二諦章敘夫不了二諦則契實之境照俗之智不可融徹境智不融徹而入薩波若海者未有之也宜哉諸佛說法常依二諦矣支桑道學之士亦恢張真俗垂統於後昆者不少且夫二諦二十家往復之族雖各述其所見關鍵緊要之處未甞著工夫豈非膚立持門戶皮相矜影響之謂乎吉藏上人間出隋世而稟朗公之學靈知難思無不克擢其髓遂廼製諸經玄疏翼贊教乘者不知其幾千萬言就中至如今章辨非有非無而二不二鼠婁栗案苽等啟沃舊師之未了發特見之明也如此其可忽諸噫嘻中世以隆其學不傳其書將泯余屬日名寺藏中得此之錦本欣戴捧讀不堪雀躍率加點挍授書林于時歲次丁丑元祿十年臘月穀日殺青斯竟東奧仙臺龍寶實養題於洛之陀峯下
